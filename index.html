<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a3a" />
  <title>Nyan Cat 🌈</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🐱</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="scene"></canvas>

  <!-- Start overlay (required to unlock audio + animation on mobile/desktop) -->
  <div id="start-overlay">
    <div class="start-card">
      <div class="start-emoji">🌈🐱🌈</div>
      <h1>Nyan Cat</h1>
      <p>Tap to launch into space</p>
      <button id="start-btn">▶ Start</button>
    </div>
  </div>

  <!-- Sound toggle -->
  <button id="mute-btn" aria-label="Toggle sound" hidden>🔊</button>

  <script src="app.js"></script>
</body>
</html>
